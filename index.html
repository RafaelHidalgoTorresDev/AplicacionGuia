<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guía para Mayores</title>
    <!-- Google Fonts: Roboto for high legibility -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Roboto:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <!-- Material Icons for intuitive visuals -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="app-header">
        <h1>Centro de Ayuda</h1>
        <p class="subtitle">Aprende a usar tu móvil paso a paso</p>
    </header>

    <main id="app-container">
        <!-- Pantalla de Inicio: Lista de tutoriales -->
        <section id="home-screen" class="screen view-active">
            <h2>¿Qué quieres aprender hoy?</h2>

            <div class="tutorial-list" id="tutorial-list-container">
                <!-- Se llenará dinámicamente con JS -->
            </div>
        </section>

        <!-- Pantalla del Tutorial: Pasos a seguir -->
        <section id="tutorial-screen" class="screen view-hidden">
            <button id="btn-back" class="btn btn-secondary">
                <span class="material-icons">arrow_back</span>
                Atrás
            </button>

            <div class="progress-container">
                <div class="progress-bar">
                    <div id="progress-fill"></div>
                </div>
                <p id="progress-text">Paso 1 de 5</p>
            </div>

            <div class="tutorial-content">
                <h2 id="step-title">Título del paso</h2>
                <div class="image-container">
                    <img id="step-image" src="" alt="Ilustración del paso" />
                </div>
                <p id="step-description" class="large-text">Descripción detallada del paso a seguir, escrita en un
                    tamaño grande y fácil de leer.</p>
            </div>

            <div class="tutorial-actions">
                <button id="btn-prev" class="btn btn-secondary btn-large">
                    <span class="material-icons">navigate_before</span>
                    Anterior
                </button>
                <button id="btn-next" class="btn btn-primary btn-large">
                    Siguiente
                    <span class="material-icons">navigate_next</span>
                </button>
                <button id="btn-finish" class="btn btn-success btn-large btn-hidden">
                    Terminar
                    <span class="material-icons">check_circle</span>
                </button>
            </div>
        </section>

        <!-- Pantalla de Éxito -->
        <section id="success-screen" class="screen view-hidden text-center">
            <span class="material-icons success-icon">emoji_events</span>
            <h2>¡Enhorabuena!</h2>
            <p class="large-text">Has completado el tutorial con éxito.</p>
            <button id="btn-home" class="btn btn-primary btn-large mt-4">
                Volver al Menú
            </button>
        </section>

    </main>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
